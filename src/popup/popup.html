<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeanIX Custom Features</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <img src="../../icons/icon-48.png" alt="LeanIX Extension" class="popup-logo" />
      <h1>LeanIX Custom Features</h1>
      <span class="version">v1.0.0</span>
    </header>

    <section class="feature-list" id="featureList">
      <p class="loading">Loading features&hellip;</p>
    </section>

    <footer class="popup-footer">
      <button id="openOptions" class="btn-secondary">Configure</button>
      <button id="refreshPage" class="btn-secondary">Reload Page</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
