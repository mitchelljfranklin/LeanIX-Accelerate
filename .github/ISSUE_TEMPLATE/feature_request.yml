name: Feature Request
description: Suggest a new feature or page integration
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! The more detail you provide, the faster we can build the right thing.

  - type: dropdown
    id: page
    attributes:
      label: Which LeanIX page?
      description: Where should this feature work?
      options:
        - Factsheet view
        - Inventory
        - Document detail
        - Architecture Decisions / Document list
        - Reports
        - Dashboard
        - Search
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the workflow friction and what you want to accomplish.
      placeholder: "e.g. Export all rows to CSV, print a formatted report, copy IDs in bulk..."
    validations:
      required: true

  - type: textarea
    id: current_workflow
    attributes:
      label: How do you do it today?
      description: Walk through your current manual process.
      placeholder: "e.g. Manually copy each row, take a screenshot, export via the ... menu..."
    validations:
      required: true

  - type: input
    id: url_structure
    attributes:
      label: Relevant page URL structure
      description: "The URL path pattern for the target page (no full domain needed)."
      placeholder: "/factsheet/... or /reports/..."
    validations:
      required: true

  - type: textarea
    id: dom_snippet
    attributes:
      label: DOM snippet (optional but helpful)
      description: |
        Share the HTML of the area where the button or feature should appear.
        Right-click the page element → **Inspect** → right-click the highlighted node → **Copy** → **Copy outerHTML**.
        This dramatically speeds up development.
      render: html

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Screenshots, mockups, or any other context that might help.
